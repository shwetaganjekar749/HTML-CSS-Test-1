<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Clone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <nav class="navbar">

            <div class="logo">
                <div class="logo-icon">▶</div>
                <h2>Catalyst</h2>
            </div>

            <ul class="nav-links">
                <li><a href="#">Performance</a></li>
                <li><a href="#">Features</a></li>
                <li><a href="#">Pricing</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>

            <div class="nav-buttons">
                <button class="login-btn">Log In</button>
                <button class="start-btn">Start Free</button>
            </div>

        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">

        <div class="version-badge">
            <span class="dot"></span>
            v4.2 — Now with real-time sync
        </div>

        <h1>
            The analytics platform <br>
            built for
            <span class="highlight">speed</span>
        </h1>

        <p>
            Stop waiting for insights. Catalyst delivers sub-second
            queries across billions of rows so your team ships
            decisions, not dashboards.
        </p>

        <div class="hero-buttons">
            <button class="trial-btn">
                Start Free Trial →
            </button>

            <button class="demo-btn">
                Watch Demo
            </button>
        </div>

    </section>

</body>
</html>
